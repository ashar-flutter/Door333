name: door333
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  responsive_sizer: ^3.3.1
  google_fonts: ^8.0.2
  get: ^4.7.3
  image_picker: ^1.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logos/
    - assets/icons/

  fonts:
    - family: Helix
      fonts:
        - asset: assets/fonts/regular.otf